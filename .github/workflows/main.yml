name: Build
on:
  push:
  pull_request:
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            os_short: linux
            ext: .so
          - os: windows-latest
            os_short: windows
            ext: .dll
      fail-fast: false
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os_short }}-x86
    steps:
      - uses: actions/checkout@v6
        with:
          path: project

      - name: Checkout SourceMod
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/sourcemod
          ref: 1.12-dev
          submodules: recursive
          path: sourcemod

      - name: Checkout Metamod:Source
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/metamod-source
          submodules: recursive
          ref: 1.12-dev
          path: metamod-source

      - uses: actions/setup-python@v6
        name: Setup Python
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install AMBuild
        run: |
          git clone https://github.com/alliedmodders/ambuild.git
          cd ambuild
          python setup.py install --user

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-multilib g++-multilib libstdc++6 lib32stdc++6 \
            libc6-dev-i386 linux-libc-dev:i386

      - name: Build
        working-directory: project
        shell: bash
        run: |
          mkdir build && cd build
          python ../configure.py \
            --sm-path="${{ github.workspace }}/sourcemod" \
            --mms-path="${{ github.workspace }}/metamod-source" \
            --enable-optimize \
            --targets=x86
          ambuild

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p staging/addons/sourcemod/extensions staging/addons/sourcemod/gamedata staging/addons/sourcemod/scripting/include staging/addons/metamod/scripting
          find project/build -name '*${{ matrix.ext }}' -exec cp {} staging/addons/sourcemod/extensions/ \;
          touch staging/addons/sourcemod/extensions/bsppeek.autoload
          cp project/gamedata/*.txt staging/addons/sourcemod/gamedata/
          cp project/include/*.inc staging/addons/sourcemod/scripting/include/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bsp-peek-${{ matrix.os_short }}
          path: staging/*

  build-docker:
    strategy:
      matrix:
        runtime:
          - name: sniper
            image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest
          - name: scout
            image: registry.gitlab.steamos.cloud/steamrt/scout/sdk:latest
      fail-fast: false
    runs-on: ubuntu-latest
    name: linux-x86-docker-${{ matrix.runtime.name }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: project

      - name: Checkout SourceMod
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/sourcemod
          ref: 1.12-dev
          submodules: recursive
          path: sourcemod

      - name: Checkout Metamod:Source
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/metamod-source
          submodules: recursive
          ref: 1.12-dev
          path: metamod-source

      - name: Build inside ${{ matrix.runtime.name }} container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work/project \
            -e HL2SDKCSGO=/work/project/hl2sdk-csgo \
            -e MMSOURCE112=/work/metamod-source \
            -e SOURCEMOD112=/work/sourcemod \
            ${{ matrix.runtime.image }} \
            bash -ec '
              dpkg --add-architecture i386 || true
              apt-get update || true
              apt-get install -y --no-install-recommends \
                  curl ca-certificates git \
                  gcc-multilib g++-multilib libstdc++6:i386 || true

              # uv ships portable prebuilt Python (python-build-standalone) -
              # statically linked, works on scout/precise glibc 2.15
              export HOME=/root
              export UV_INSTALL_DIR=/opt/uv
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH=/opt/uv:$PATH

              # uv-managed Python 3.11 + AMBuild from upstream master.
              # Force musl variant: default cpython-gnu needs glibc 2.17, scout has 2.15.
              uv venv --python cpython-3.11-linux-x86_64-musl /opt/ambuild-venv
              uv pip install --python /opt/ambuild-venv/bin/python \
                  git+https://github.com/alliedmodders/ambuild.git@master
              export PATH=/opt/ambuild-venv/bin:$PATH

              mkdir -p build && cd build
              /opt/ambuild-venv/bin/python ../configure.py \
                --sm-path=/work/sourcemod \
                --mms-path=/work/metamod-source \
                --enable-optimize \
                --targets=x86
              /opt/ambuild-venv/bin/ambuild
            '

      - name: Stage release files
        run: |
          mkdir -p staging/addons/sourcemod/extensions staging/addons/sourcemod/gamedata staging/addons/sourcemod/scripting/include staging/addons/metamod/scripting
          find project/build -name '*.so' -exec cp {} staging/addons/sourcemod/extensions/ \;
          touch staging/addons/sourcemod/extensions/bsppeek.autoload
          cp project/gamedata/*.txt staging/addons/sourcemod/gamedata/
          cp project/include/*.inc staging/addons/sourcemod/scripting/include/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bsp-peek-linux-docker-${{ matrix.runtime.name }}
          path: staging/*