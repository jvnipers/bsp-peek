name: Build
on:
  push:
  pull_request:

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set.outputs.versions }}
    steps:
      - id: set
        name: Set version matrix
        run: |
          python3 - << 'PYEOF'
          import json, os
          VERSIONS = [
              ("1.12-dev", "1.12-dev"),
              ("master", "1.12-dev"),
          ]
          versions = [
              {"sm_ver": s, "mm_ver": m,
               "sm_label": s.replace("-dev", ""),
               "mm_label": m.replace("-dev", ""),}
              for s, m in VERSIONS
          ]
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("versions=" + json.dumps(versions) + "\n")
          PYEOF

  build:
    needs: config
    strategy:
      matrix:
        platform:
          - { os: ubuntu-latest, os_short: linux, ext: .so }
          - { os: windows-latest, os_short: windows, ext: .dll }
        version: ${{ fromJSON(needs.config.outputs.versions) }}
      fail-fast: false
    runs-on: ${{ matrix.platform.os }}
    name: ${{ matrix.platform.os_short }}--mm-${{ matrix.version.mm_label }}--sm-${{ matrix.version.sm_label }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: project

      - name: Checkout SourceMod
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/sourcemod
          ref: ${{ matrix.version.sm_ver }}
          submodules: recursive
          path: sourcemod

      - name: Checkout Metamod:Source
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/metamod-source
          submodules: recursive
          ref: ${{ matrix.version.mm_ver }}
          path: metamod-source

      - uses: actions/setup-python@v6
        name: Setup Python
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install AMBuild
        run: |
          git clone https://github.com/alliedmodders/ambuild.git
          cd ambuild
          python setup.py install --user

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-multilib g++-multilib libstdc++6 lib32stdc++6 \
            libc6-dev-i386 linux-libc-dev:i386

      - name: Build
        working-directory: project
        shell: bash
        run: |
          mkdir build && cd build
          python ../configure.py \
            --sm-path="${{ github.workspace }}/sourcemod" \
            --mms-path="${{ github.workspace }}/metamod-source" \
            --enable-optimize \
            --targets=x86
          ambuild

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p staging/addons/sourcemod/extensions staging/addons/sourcemod/gamedata staging/addons/sourcemod/scripting/include staging/addons/metamod/scripting
          find project/build -name '*${{ matrix.platform.ext }}' -exec cp {} staging/addons/sourcemod/extensions/ \;
          cp project/gamedata/*.txt staging/addons/sourcemod/gamedata/
          cp project/include/*.inc staging/addons/sourcemod/scripting/include/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bsp-peek-${{ matrix.platform.os_short }}--mm-${{ matrix.version.mm_label }}--sm-${{ matrix.version.sm_label }}
          path: staging/*

  build-docker:
    needs: config
    strategy:
      matrix:
        runtime:
          - name: sniper
            image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest
          #- name: sourcemod-deb11
          #  image: ghcr.io/alliedmodders/build-containers/debian11-clang22:latest
          #- name: scout
          #  image: registry.gitlab.steamos.cloud/steamrt/scout/sdk:latest
        version: ${{ fromJSON(needs.config.outputs.versions) }}
      fail-fast: false
    runs-on: ubuntu-latest
    name: linux-${{ matrix.runtime.name }}--mm-${{ matrix.version.mm_label }}--sm-${{ matrix.version.sm_label }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: project

      - name: Checkout SourceMod
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/sourcemod
          ref: ${{ matrix.version.sm_ver }}
          submodules: recursive
          path: sourcemod

      - name: Checkout Metamod:Source
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/metamod-source
          submodules: recursive
          ref: ${{ matrix.version.mm_ver }}
          path: metamod-source

      - name: Build inside container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work/project \
            -e HL2SDKCSGO=/work/project/hl2sdk-csgo \
            -e MMSOURCE=/work/metamod-source \
            -e SOURCEMOD=/work/sourcemod \
            ${{ matrix.runtime.image }} \
            bash -ec '
              dpkg --add-architecture i386 || true
              apt-get update
              apt-get install -y --no-install-recommends \
                  python3-pip python3-venv git ca-certificates \
                  gcc-multilib g++-multilib libstdc++6:i386
              python3 -m venv /opt/ambuild-venv
              /opt/ambuild-venv/bin/pip install --upgrade pip
              /opt/ambuild-venv/bin/pip install git+https://github.com/alliedmodders/ambuild.git@master
              export PATH=/opt/ambuild-venv/bin:$PATH
              mkdir -p build && cd build
              python3 ../configure.py \
                --sm-path=/work/sourcemod \
                --mms-path=/work/metamod-source \
                --enable-optimize \
                --targets=x86
              ambuild
            '

      - name: Stage release files
        run: |
          mkdir -p staging/addons/sourcemod/extensions staging/addons/sourcemod/gamedata staging/addons/sourcemod/scripting/include staging/addons/metamod/scripting
          find project/build -name '*.so' -exec cp {} staging/addons/sourcemod/extensions/ \;
          cp project/gamedata/*.txt staging/addons/sourcemod/gamedata/
          cp project/include/*.inc staging/addons/sourcemod/scripting/include/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bsp-peek--linux-${{ matrix.runtime.name }}--mm-${{ matrix.version.mm_label }}--sm-${{ matrix.version.sm_label }}
          path: staging/*

  release:
    needs: [build, build-docker]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            zip -r "../${dir%/}.zip" "$dir"
          done
          cd ..

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --generate-notes \
            *.zip
